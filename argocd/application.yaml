apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-demo
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: gitops-demo=us-central1-docker.pkg.dev/gitops-lab-502912/gitops-demo/gitops-demo
    argocd-image-updater.argoproj.io/gitops-demo.update-strategy: digest
    argocd-image-updater.argoproj.io/gitops-demo.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/gitops-demo.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: default
  source:
    repoURL: git@github.com:Harshitha-1701/gitops-demo.git
    targetRevision: HEAD
    path: helm/gitops-demo
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: gitops-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
